<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Argushaus &middot; Coming soon</title>
<meta name="description" content="Argushaus. Senior AI talent for German boutique AI consultancies. Site coming soon." />
<meta name="theme-color" content="#EFEBE1" />
<meta name="robots" content="noindex" />

<meta property="og:title" content="Argushaus" />
<meta property="og:description" content="Senior AI talent. German consultancies. Quietly connected." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://argushaus.com" />
<meta property="og:image" content="/logo/png/argushaus-og-1200x630.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500,600,700&display=swap" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="icon" type="image/svg+xml" href="/logo/argushaus-favicon.svg" />
<link rel="apple-touch-icon" href="/logo/png/favicon-180.png" />

<style>
  :root {
    --ink: #0A0A0C;
    --cream: #E8E2D4;
    --cream-dk: #D6CFBE;
    --muted: #5A5852;
    --red: #C8362A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, var(--cream-dk) 0%, var(--cream) 60%);
    color: var(--ink);
    font-family: 'Switzer', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 32px 24px;
  }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 0;
  }
  .wordmark {
    font-family: 'Switzer', sans-serif;
    font-weight: 700;
    font-size: clamp(56px, 12vw, 144px);
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--ink);
  }
  .wordmark .dot {
    color: var(--red);
  }
  .tag {
    margin-top: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }
  .status {
    margin-top: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
  }
  .status-line {
    font-family: 'Switzer', sans-serif;
    font-weight: 500;
    font-size: clamp(20px, 2.8vw, 28px);
    letter-spacing: -0.01em;
    color: var(--ink);
    max-width: 640px;
  }
  .status-cities {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
  }
  .bottom a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 2px;
    transition: opacity 0.2s;
  }
  .bottom a:hover {
    opacity: 0.6;
  }
  @media (max-width: 640px) {
    body { padding: 20px 16px; }
    .top, .bottom {
      font-size: 9px;
      letter-spacing: 1.8px;
    }
    .bottom {
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }
    .status-cities {
      font-size: 10px;
      letter-spacing: 1.5px;
    }
    .status { margin-top: 40px; }
  }
</style>
</head>
<body>

  <header class="top">
    <span>Argushaus<span style="color: var(--red);">.</span></span>
    <span>Est. 2026</span>
  </header>

  <main class="stage">
    <h1 class="wordmark">Argushaus<span class="dot">.</span></h1>
    <p class="tag">Senior AI Talent</p>

    <div class="status">
      <span class="status-label">/ Under construction</span>
      <p class="status-line">Our site is being built. For mandates or introductions, write to us directly.</p>
      <p class="status-cities">München · Berlin · Frankfurt · Düsseldorf · Köln · Hamburg</p>
    </div>
  </main>

  <footer class="bottom">
    <a href="mailto:hello@argushaus.com">hello@argushaus.com</a>
    <span>Part of the Scorpius Search group</span>
  </footer>

</body>
</html>
